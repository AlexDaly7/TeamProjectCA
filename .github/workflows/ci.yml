name: CI

on:
  pull_request:
    branches: [main]

jobs:
 build:
  runs-on: ubuntu-latest

  strategy:
    fail-fast: true
    matrix:
      node-version: [24.x]

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: oven-sh/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run only Nuxt tests
      run: npm run test:nuxt